# Invigil grades itself (dogfood). The nightly Cold-Start Gate installs the
# published PyPI package and runs the published CLI image — the two things a
# cold-start reader actually downloads.
version: 1

project:
  name: invigil
  language: python
  min_gate: G4
  enforce: false        # report-only until the grade stabilizes (C6 flips this)

artifacts:
  # `pip install invigil` on a clean venv must succeed today, not just at release time.
  - type: pypi
    name: invigil
  # The CLI image: `command` present → run to completion, exit 0 is the contract.
  - type: ghcr
    image: ghcr.io/invigil/invigil:latest
    command: ["--version"]
    expect_contains: "invigil"
