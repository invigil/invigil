name: Nightly smoke — published artifacts

# S3: Invigil's own nightly smoke test. Calls the reusable Cold-Start Gate (stranger-gate.yml) to
# boot the published PyPI package and Docker image on a clean runner daily.
# This is exactly the "smoke-published" check that invigil score looks for.

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch:       # manual trigger for testing

permissions:
  contents: read

jobs:
  stranger:
    name: Boot published invigil from a cold start
    uses: invigil/invigil/.github/workflows/stranger-gate.yml@6e5a0a8ed24edd88ba9e59b235044a78ad56e8ab  # v1
    with:
      path: "."
