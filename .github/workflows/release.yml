name: Release

on:
  push:
    # Semver tags only — the moving `v1` major tag must NOT trigger a second
    # publish of the same version (PyPI rejects duplicate versions).
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  release:
    name: Build, publish, sign, SBOM
    runs-on: ubuntu-latest
    # Trusted publishing matches on repo + workflow + environment; the PyPI
    # pending publisher is registered with environment "pypi".
    environment: pypi
    permissions:
      contents: write        # create the GitHub Release + move the vMAJOR tag
      id-token: write        # cosign keyless + PyPI trusted publishing (OIDC)
      packages: write        # push the CLI image to ghcr.io
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Verify the tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          echo "tag=$tag  pyproject=$ver"
          [ "$tag" = "$ver" ] || { echo "::error::tag v$tag does not match pyproject version $ver"; exit 1; }

      - name: Build sdist + wheel
        run: |
          pip install --require-hashes -r .github/requirements/build.txt
          python -m build

      # Publish FIRST, while dist/ holds only the wheel + sdist. Signing (below)
      # writes .sig/.pem into dist/, which the PyPI upload would otherwise reject.
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@67339c736fd9354cd4f8cb0b744f2b82a74b5c70  # v1.12.3

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: invigil.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      # cosign v3 only emits the new bundle format; --output-signature/.pem are
      # ignored. Verify with:
      #   cosign verify-blob --bundle <f>.sigstore.json \
      #     --certificate-identity-regexp 'github.com/invigil/invigil' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com <f>
      - name: Sign the wheel, sdist, and SBOM (keyless)
        run: |
          for f in dist/* invigil.spdx.json; do
            cosign sign-blob --yes "$f" --bundle "$f.sigstore.json"
          done

      # Plain docker CLI, no marketplace actions — same "shell out, never SDK"
      # rule the Cold-Start Gate follows, and two fewer supply-chain dependencies.
      - name: Build and push the CLI image (ghcr)
        run: |
          ver="${GITHUB_REF_NAME#v}"
          major="${ver%%.*}"
          image="ghcr.io/${GITHUB_REPOSITORY}"
          echo "${{ github.token }}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          docker build -t "$image:$ver" -t "$image:$major" -t "$image:latest" .
          for t in "$ver" "$major" latest; do docker push "$image:$t"; done

      - name: Sign the CLI image (keyless, by digest)
        run: |
          ver="${GITHUB_REF_NAME#v}"
          image="ghcr.io/${GITHUB_REPOSITORY}"
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$image:$ver")"
          cosign sign --yes "$digest"

      - name: GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          files: |
            dist/*
            invigil.spdx.json
            invigil.spdx.json.sigstore.json
          generate_release_notes: true

      # Keep the `invigil/invigil@v1` tag and `rev: v1` pointing at the newest
      # v1.x.y. Safe with the trigger above: `v1` doesn't match v*.*.*, so
      # force-moving it never re-publishes.
      - name: Move the vMAJOR tag to this release
        run: |
          ver="${GITHUB_REF_NAME#v}"
          major="v${ver%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$major" "$GITHUB_SHA"
          git push -f origin "$major"
