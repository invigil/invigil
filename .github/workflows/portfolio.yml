name: Portfolio grades

# C5 — cross-repo aggregation. On a schedule, score every tracked repo and
# regenerate PORTFOLIO.md's grade table, so the portfolio grid is a machine
# artifact instead of a hand-typed, always-stale table. Commits only when the
# grades actually change.

on:
  schedule:
    - cron: "0 5 * * 1"   # Monday mornings
  workflow_dispatch:

permissions:
  contents: read

env:
  # Space-separated owner/name of the repos to grade. Edit here to add repos.
  REPOS: "invicton/bakex kaaval/kaaval"

jobs:
  portfolio:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # pushes the refreshed PORTFOLIO.md + badges
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - run: pip install --quiet .

      - name: Clone tracked repos + score them (this repo included)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          paths="."
          for slug in $REPOS; do
            dir="_repo_$(basename "$slug")"
            # Tolerant: an unreachable/private repo is skipped, not fatal — the
            # last-committed badge for it simply stays until it becomes reachable.
            if gh repo clone "$slug" "$dir" -- --depth 1 2>/dev/null; then
              paths="$paths $dir"
            else
              echo "::warning::could not clone $slug — skipping"
            fi
          done
          [ -f PORTFOLIO.md ] || printf '# Portfolio grades\n\n' > PORTFOLIO.md
          invigil portfolio $paths --update PORTFOLIO.md --badges-dir badges
          rm -rf _repo_*

      - name: Commit if changed
        run: |
          if ! git diff --quiet PORTFOLIO.md badges/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add PORTFOLIO.md badges/
            git commit -m "chore: refresh portfolio grades + badges [skip ci]"
            git push
          else
            echo "grades unchanged"
          fi
