name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install --quiet uv
      - name: Install (locked)
        run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    name: Tests (pytest ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv
        run: pip install --quiet uv
      - name: Install (locked)
        run: uv sync --locked
      - run: uv run pytest --cov=invigil --cov-report=term-missing --cov-fail-under=80

  self-score:
    name: Invigil grades Invigil (dogfood)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: ./                       # this repo's own action
        with:
          comment: "false"
          enforce: "false"             # report-only until the grade stabilizes
