name: Cold-Start Gate (reusable)

# Layer 2 of Invigil. Generalizes the copy-pasted `smoke-published.yml` workflows:
# on a clean runner, boot each published artifact declared in the caller's
# .invigil.yml (pip install / docker run + any service containers) and probe its
# core surface within the 10-minute budget. Repo CI tests source; this tests what
# users actually download, after dependency drift.
#
# Callers use it in ~5 lines:
#   jobs:
#     stranger:
#       uses: invigil/invigil/.github/workflows/stranger-gate.yml

on:
  workflow_call:
    inputs:
      path:
        description: "Path (in the caller repo) to the dir holding .invigil.yml."
        required: false
        type: string
        default: "."
      invigil-ref:
        description: "Invigil version/ref to install (pypi spec or a VCS ref)."
        required: false
        type: string
        default: "invigil"

permissions:
  contents: read

jobs:
  stranger:
    name: Boot published artifacts from a cold start
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Install Invigil
        run: pip install --quiet "${{ inputs.invigil-ref }}"
      - name: Run the Cold-Start Gate
        run: invigil stranger "${{ inputs.path }}"
